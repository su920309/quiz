        content: `依職業安全衛生法第8條第1項規定：「製造者或輸入者對於中央主管機關公告列入型式驗證之機械、設備或器具，非經中央主管機關認可之驗證機構實施型式驗證合格及張貼合格標章，不得產製運出廠場或輸入」。請依上開規定，據以簡答下列各小題。\n(一)某雇主日前因設置未經型式驗證合格之列管產品，遭查處罰鍰在案，致當事人查閱職業安全衛生法第8條第1項及同法第44條第2項規定：「違反…第8條第1項…規定者，處新臺幣20萬元以上200萬元以下罰鍰…」，竟然發現該法第8條第1項規定僅針對「製造者或輸入者」之限制事項規範，並未明文涉及「雇主不得設置」之禁止義務，乃對雇主受罰衍生其法律責任主體疑義，心生不服處分之民怨，若台端擔任該公司職業安全管理師，本於職責對檢查機構裁罰「雇主」之執法依據與援引法條是否妥適，有將此一法理分析見解提供雇主審酌釐清之必要，爰請說明下列事項：\n1.處分之適法性有否疑義，繫於雇主援引上述法條之規定是否正確，否則滋生誤解，是以若能就雇主援引法條之文義內容不當之處予以導正，即可使本案裁罰處分於法有據，法理規範殆無疑義，請台端就本案爭點之處置，提供法制見解。(3分)\n2.承上，「交流電焊機自動電擊防止裝置」屬本法第8條第1項之列管產品，若雇主現今仍設置未經型式驗證合格之該產品者，實務上依法裁罰殆無疑義。對於依法裁罰處分「雇主」有否合宜性，請簡述本案中央主管機關已對法制面採取何項行政作為，方使本案裁罰具有正當性與適法性？(4分)\n(二)依本法第8條所定驗證機構，須經中央主管機關認可，若有A、B、C等單位對外招攬客戶，宣稱具備資格條件如下表，並自稱將據以申請認可云云，請就表列A、B、C所述事項，分別依法定資格條件，列舉其各該於法不合之處。\n(三)某公司採購本法第8條所定列管產品一批，因得標廠商交貨驗收之產品本體上未張貼驗證合格標章，經採購單位拒收後，得標廠商乃補付影印之驗證合格標章紙本若干及膠水數瓶供客戶自行張貼，若台端為驗收人員之一，能否接受此一改正措施予以驗收？請說明立場與上開標章製作之法定規格要件。(3分)\n(四)對於未經型式驗證合格之產品或型式驗證逾期者，不得使用驗證合格標章或易生混淆之類似標章揭示於產品，請說明下列事項：\n1.若對揭示於產品之驗證標章相關事項需了解更多資訊，且擬確認其是否屬已完成驗證合格之產品型式者，請說明目前具有方便與快速且能對外公開提供全年24小時免費瀏覽驗證合格產品清單等相關資訊之查詢管道？(2分)\n2.承上，驗證合格標章，其格式由圖式及識別號碼組成；識別號碼應緊鄰圖式之右方或下方，且由字軌TC、指定代碼及發證機構代號組成，若擬查悉張貼驗證合格標章之某產品之製造者名稱、廠址、系列型式或驗證有效期限等，請說明須查閱何種文件？(2分)`,

let currentQuestion = null;
let savedAnswers = [];
let hasSavedCurrent = false;

// 初始化顯示題庫總數
document.addEventListener("DOMContentLoaded", () => {
	resetEntireSystem(false); // 乾淨重置所有狀態
});

function updateStatusBar() {
    const remaining = pool.length - savedAnswers.length;
    
    // 安全地更新下方歷史紀錄區的已答題數
    const doneCountEl = document.getElementById("done-count");
    if (doneCountEl) {
        doneCountEl.innerText = savedAnswers.length;
    }

    const metaInfo = document.getElementById("meta-info");
    if (metaInfo) {
        if (currentQuestion) {
            // 當抽選到題目時，完美渲染出 題號、來源、標籤、剩餘題數
            metaInfo.innerHTML = `🎯 <strong>【題目 ${currentQuestion.id}】</strong> | 
                                  📍 來源：<span style="color: #e67e22;">${currentQuestion.orig || "無"}</span> | 
                                  🏷️ 標籤：${currentQuestion.tags || "無標籤"} | 
                                  📊 本輪剩餘未答：<strong>${remaining}</strong> 題 (總共 ${pool.length} 題)`;
        } else {
            // 初始狀態或重置狀態
            metaInfo.innerHTML = `💡 系統就緒！目前題庫內共有 <strong>${pool.length}</strong> 題。請點擊隨機抽題開始練習。`;
        }
    }
}

function drawQuestion() {
    const currentInput = document.getElementById("user-answer").value.trim();

    if (currentInput && currentQuestion) {
	if (hasSavedCurrent) {
        if (!confirm("✅ 本題已完成暫存！是否要再次確認答案並切換下一題？")) {
            return;
        }
    }else {
            // 還沒點暫存
            if (!confirm("⚠️ 您當前的作答內容尚未暫存，確定要放棄並切換下一題嗎？")) {
                return;
            }
        }
    }

	const availablePool = pool.filter(q => !savedAnswers.some(saved => saved.id === q.id));
    
    // 如果題目全寫完了，引導自動開啟新一輪
    if (availablePool.length === 0) {
        alert("🎉 太厲害了！本輪題庫內的所有題目您已全部抽答、暫存完畢！\n系統將自動幫您重置，開啟全新的下一輪複習！");
        resetEntireSystem(false);
        return;
    }
    
    // 從全部題庫進行隨機抽選
    const rand = Math.floor(Math.random() * availablePool.length);
    currentQuestion = availablePool[rand];
	hasSavedCurrent = false;
    
    document.getElementById("question-content").innerText = currentQuestion.content;

    const tableContainer = document.getElementById("table-container");
    if (tableContainer) {
        tableContainer.innerHTML = currentQuestion.tableHtml ? currentQuestion.tableHtml : "";
    }

    document.getElementById("user-answer").value = ""; 
    document.getElementById("user-answer").focus();
	updateStatusBar();
}

function saveCurrentAnswer() {
    if (!currentQuestion) {
        alert("請先點擊「隨機抽題」！");
        return;
    }
    const ansText = document.getElementById("user-answer").value.trim();
    if (!ansText) {
        alert("作答區空空的，請輸入內容後再儲存暫存喔！");
        return;
    }
    
const existingIndex = savedAnswers.findIndex(saved => saved.id === currentQuestion.id);
    
    if (existingIndex === -1) {

    savedAnswers.push({
        id: currentQuestion.id,
        tags: currentQuestion.tags,
        question: currentQuestion.content,
        answer: ansText,
        time: new Date().toLocaleTimeString()
    });
    
    const historyList = document.getElementById("history-list");
    const item = document.createElement("div");
    item.className = "history-item";
    item.id = `history-item-${currentQuestion.id}`;
    item.innerText = `[${new Date().toLocaleTimeString()}] 【題目 ${currentQuestion.id}】暫存成功！(本輪不再重複抽到)`;
    historyList.insertBefore(item, historyList.firstChild);
} else {
	savedAnswers[existingIndex].answer = ansText;
    }
    
	hasSavedCurrent = true;
    alert(`題目 ${currentQuestion.id} 作答暫存成功！此題目在「本輪練習」中將不會再被抽到。`);
	updateStatusBar();
}

function resetEntireSystem(needConfirm) {
    if (needConfirm) {
        if (!confirm("確定要放棄本輪的進度，清除所有紀錄重頭來過嗎？")) {
            return;
        }
    }
    
    // 1. 清空變數狀態
    currentQuestion = null;
    savedAnswers = [];
    hasSavedCurrent = false;
    
    // 2. 還原畫面初始狀態
    document.getElementById("question-content").innerText = "點擊下方的「🎲 隨機抽題」按鈕開始練習。本輪作答過的題目將不會再被重複抽到。";
    const tableContainer = document.getElementById("table-container");
    if (tableContainer) tableContainer.innerHTML = "";
    document.getElementById("user-answer").value = "";
    document.getElementById("history-list").innerHTML = "";
    
    // 3. 更新狀態
    updateStatusBar();
    if (needConfirm) alert("系統已重置！所有題目已重新釋放回題庫池中，請點擊隨機抽題開啟新的一輪。");
}

function downloadHistory() {
    if (savedAnswers.length === 0) {
        alert("目前還沒有暫存的作答紀錄可以導出下載。");
        return;
    }
    
    let output = `======================================================\n`;
    output += `   職安甲級術科隨機作答全紀錄 (${new Date().toLocaleDateString()})   \n`;
    output += `======================================================\n\n`;
    
    savedAnswers.forEach((item, index) => {
        output += `【練習序號：${index + 1}】--------------------------------------\n`;
        output += `題目編號：${item.id} \n考試標籤：${item.tags} \n紀錄時間：${item.time}\n`;
        output += `------------------------------------------------------\n`;
        output += `▶️ 題目內容：\n${item.question}\n\n`;
        output += `✍️ 您的擬答：\n${item.answer}\n`;
        output += `======================================================\n\n`;
    });
    
    const blob = new Blob([output], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `職安甲級術科練習紀錄_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
